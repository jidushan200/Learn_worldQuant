    // ── 一键打开：每隔 300ms 打开一个，防止浏览器拦截 ────────
    document.getElementById("btnAll").addEventListener("click", () => {
      items.forEach((item, i) => {
        setTimeout(() => window.open(BASE + item.id, "_blank"), i * 300);
      });
    });
  </script>

</body>
</html>
